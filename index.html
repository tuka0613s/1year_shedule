<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Year Schedule</title>
  <link rel="stylesheet" href="style.css?v=15">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">
  <script async defer src="https://apis.google.com/js/api.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="year-controls">
        <button id="btn-prev-year">&lt;</button>
        <h1 id="current-year-display"><span id="current-year">2026</span></h1>
        <button id="btn-next-year">&gt;</button>
      </div>
      <div class="header-controls">
        <label class="toggle-label"><input type="checkbox" id="toggle-week"> 週番号</label>
        <label class="toggle-label mode-toggle"><input type="checkbox" id="toggle-compact"> 超圧縮</label>
        <button id="btn-theme-toggle">🌙</button>
        <button id="btn-google-sync" title="Googleカレンダー連携" class="btn-google">📅 Google連携</button>
        <button id="btn-today">今日</button>
      </div>
    </header>
    
    <main class="calendar-grid" id="calendar">
      <!-- Months will be injected here via JS -->
    </main>
  </div>

  <!-- Modal for Adding/Editing Schedule -->
  <div id="schedule-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2 id="modal-title">予定を追加</h2>
      <form id="schedule-form">
        <input type="hidden" id="event-id">
        <div class="form-group">
          <label>タイトル</label>
          <input type="text" id="event-title" required placeholder="予定を入力...">
        </div>
        <div class="form-group row">
          <div>
            <label>開始日</label>
            <input type="date" id="event-start" required>
          </div>
          <div>
            <label>終了日</label>
            <input type="date" id="event-end" required>
          </div>
        </div>
        <div class="form-group">
          <label>カラー</label>
          <div class="color-picker">
            <label><input type="radio" name="color" value="accent-blue" checked><span class="color-dot bg-blue"></span></label>
            <label><input type="radio" name="color" value="accent-pink"><span class="color-dot bg-pink"></span></label>
            <label><input type="radio" name="color" value="accent-green"><span class="color-dot bg-green"></span></label>
            <label><input type="radio" name="color" value="accent-purple"><span class="color-dot bg-purple"></span></label>
            <label><input type="radio" name="color" value="accent-orange"><span class="color-dot bg-orange"></span></label>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="btn-cancel">キャンセル</button>
          <button type="button" class="btn-delete hidden" id="btn-delete">削除</button>
          <button type="submit" class="btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal for Google API Settings -->
  <div id="google-settings-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Google API設定</h2>
      <p class="settings-desc">Googleカレンダーと連携するには、ご自身のAPIキーとクライアントIDが必要です。（無料枠で利用可能です）</p>
      <form id="google-settings-form">
        <div class="form-group">
          <label>API キー</label>
          <input type="text" id="gapi-key" placeholder="AIzaSy...">
        </div>
        <div class="form-group">
          <label>OAuth クライアントID</label>
          <input type="text" id="gapi-client-id" placeholder="123456789-abc...apps.googleusercontent.com">
        </div>
        <div class="form-group">
          <label>カレンダーID</label>
          <input type="text" id="gapi-calendar-id" placeholder="primary" value="primary">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="btn-cancel-gapi">閉じる</button>
          <button type="button" class="btn-danger hidden" id="btn-logout-gapi">連携解除</button>
          <button type="submit" class="btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
